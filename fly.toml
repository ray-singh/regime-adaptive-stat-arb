app = 'regime-pairs'
primary_region = 'ord'

[build]
  dockerfile = "dashboard/backend/Dockerfile"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048
