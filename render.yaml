services:
  - type: web
    name: regime-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt gunicorn
    startCommand: python -m gunicorn "dashboard.backend.wsgi:app" --bind "0.0.0.0:$PORT" --workers 1 --threads 8 --timeout 300
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
    rootDir: .
