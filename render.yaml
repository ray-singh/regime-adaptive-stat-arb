services:
  - type: web
    name: regime-backend
    runtime: python
    plan: free
    buildCommand: ^pip install -r requirements.txt
    startCommand: gunicorn dashboard.backend.app:create_app() -b 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 300
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 10000
    rootDir: .
